name: Bug report
description: Report a GEM problem without including secrets.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include passwords, real account credentials, session IDs, raw vault files, private logs, or live-grid identifiers.
  - type: input
    id: version
    attributes:
      label: GEM version
      placeholder: "0.1.47"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - Windows
        - macOS
        - Android
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the visible behaviour.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open GEM
        2. ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Screenshots are useful. Redact private data first.
