name: Feature request
description: Suggest a GEM improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What operator workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: What should GEM do?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform impact
      options:
        - All platforms
        - Linux
        - Windows
        - macOS
        - Android
        - Not sure
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Do not include private account or live-grid data.
