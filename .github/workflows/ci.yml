name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run focused checks
        run: ./gradlew --no-daemon :gem-ui:check :apps:desktop:check :apps:android:check checkGemBoundaries
